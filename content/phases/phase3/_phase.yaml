id: '3'
name: Programming Fundamentals
slug: phase3
description: Welcome to Phase 3! This phase is all about programming with Python and building real applications. Programming
  is a fundamental skill for cloud engineering, enabling you to create, manage, and optimize cloud resources efficiently.
  You'll build a working API with database integration—the foundation for everything that follows.
short_description: Learn Python programming, FastAPI, and databases. Build a real-world Journal API project.
order: 3
hands_on_verification:
  requirements:
  - id: journal-pr-logging
    submission_type: pr_review
    name: 'PR: Logging Setup'
    description: Submit the merged PR where you configured logging in api/main.py.
    required_repo: learntocloud/journal-starter
    expected_files:
    - api/main.py
    grading_criteria:
    - "MUST have `import logging` or `import structlog` statement added"
    - "MUST call logging.basicConfig() or configure structlog"
    - "MUST set a log level (INFO, DEBUG, or WARNING)"
    - "SHOULD have at least one logger.info() or logger.debug() call"
    pass_indicators:
    - "import logging"
    - "import structlog"
    - "logging.basicConfig"
    - "logging.getLogger"
    - "structlog.configure"
    fail_indicators:
    - "# TODO: Setup basic console logging"
    - "# Hint: Use logging.basicConfig()"
  - id: journal-pr-get-entry
    submission_type: pr_review
    name: 'PR: GET Single Entry'
    description: Submit the merged PR where you implemented GET /entries/{entry_id} in the journal router.
    required_repo: learntocloud/journal-starter
    expected_files:
    - api/routers/journal_router.py
    grading_criteria:
    - "MUST NOT raise HTTPException(status_code=501) - that is the starter stub"
    - "MUST call entry_service.get_entry(entry_id)"
    - "MUST raise HTTPException(status_code=404) when entry is None"
    - "MUST return the entry object"
    pass_indicators:
    - "entry_service.get_entry"
    - "status_code=404"
    fail_indicators:
    - 'detail="Not implemented - complete this endpoint!"'
  - id: journal-pr-delete-entry
    submission_type: pr_review
    name: 'PR: DELETE Entry'
    description: Submit the merged PR where you implemented DELETE /entries/{entry_id} in the journal router.
    required_repo: learntocloud/journal-starter
    expected_files:
    - api/routers/journal_router.py
    grading_criteria:
    - "MUST NOT raise HTTPException(status_code=501) - that is the starter stub"
    - "MUST check if entry exists before deleting"
    - "MUST raise HTTPException(status_code=404) when entry not found"
    - "MUST call entry_service.delete_entry(entry_id)"
    - "SHOULD return status 200 or 204 on success"
    pass_indicators:
    - "entry_service.delete_entry"
    - "entry_service.get_entry"
    - "status_code=404"
    fail_indicators:
    - 'detail="Not implemented - complete this endpoint!"'
  - id: journal-pr-ai-analysis
    submission_type: pr_review
    name: 'PR: AI Analysis'
    description: Submit the merged PR where you implemented analyze_journal_entry() in llm_service.py and the analyze endpoint.
    required_repo: learntocloud/journal-starter
    expected_files:
    - api/services/llm_service.py
    - api/routers/journal_router.py
    grading_criteria:
    - "llm_service.py: MUST NOT raise NotImplementedError - that is the starter stub"
    - "llm_service.py: MUST import an LLM SDK (openai, anthropic, boto3, etc.)"
    - "llm_service.py: MUST make an API call to an LLM provider"
    - "llm_service.py: MUST return a dict with sentiment, summary, and topics keys"
    - "journal_router.py: analyze endpoint MUST NOT raise HTTPException(501)"
    - "journal_router.py: MUST call llm_service.analyze_journal_entry()"
    pass_indicators:
    - "analyze_journal_entry"
    - "from openai"
    - "import openai"
    - "import anthropic"
    - "import boto3"
    - "sentiment"
    - "summary"
    - "topics"
    fail_indicators:
    - "Implement this function using your chosen LLM API"
    - "See the Learn to Cloud curriculum for guidance."
    - 'detail="Implement this endpoint - see Learn to Cloud curriculum"'
  - id: journal-pr-cloud-cli
    submission_type: pr_review
    name: 'PR: Cloud CLI Setup'
    description: Submit the merged PR where you uncommented your cloud CLI tool in devcontainer.json.
    required_repo: learntocloud/journal-starter
    expected_files:
    - .devcontainer/devcontainer.json
    grading_criteria:
    - "At least ONE of these lines MUST be uncommented (no leading //):"
    - '  - "ghcr.io/devcontainers/features/azure-cli:1": {}'
    - '  - "ghcr.io/devcontainers/features/aws-cli:1": {}'
    - '  - "ghcr.io/devcontainers/features/gcloud:1": {}'
    pass_indicators:
    - '"ghcr.io/devcontainers/features/azure-cli:1"'
    - '"ghcr.io/devcontainers/features/aws-cli:1"'
    - '"ghcr.io/devcontainers/features/gcloud:1"'
    fail_indicators:
    - '// "ghcr.io/devcontainers/features/azure-cli:1"'
    - '// "ghcr.io/devcontainers/features/aws-cli:1"'
    - '// "ghcr.io/devcontainers/features/gcloud:1"'
  - id: journal-api-implementation
    submission_type: code_analysis
    name: Verify Journal API Implementation
    description: After all PRs are merged, submit your fork for automated code analysis to verify the final implementation on main.
    required_repo: learntocloud/journal-starter
topics:
- python
- fastapi
- databases
- genai-apis
- build-the-app
