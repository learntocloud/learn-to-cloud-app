version: 2
updates:
  # Python dependencies (uv ecosystem — updates pyproject.toml + uv.lock together)
  - package-ecosystem: "uv"
    directory: "/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-api:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/apps/verification-functions"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-functions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/packages/learn-to-cloud-shared"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-shared:
        patterns:
          - "*"

  # npm dependencies (Tailwind CSS)
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "javascript"
    groups:
      npm-all:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-all:
        patterns:
          - "*"

  # Terraform providers
  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "terraform"
    groups:
      terraform-all:
        patterns:
          - "*"
