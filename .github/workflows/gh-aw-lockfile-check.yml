name: "Agentic Workflow Lock File Check"

# Verifies that every .github/workflows/*.lock.yml file is up to date with
# its corresponding .md source. The lock file is generated by `gh aw compile`
# from the shared github/gh-aw-actions runtime; hand edits to the .md, or a
# Dependabot bump of gh-aw/gh-aw-actions, can silently leave it stale, which
# then fails at runtime instead of at review time.

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/*.md'
      - '.github/workflows/*.lock.yml'
      - '.github/aw/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-lock-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      - name: Install gh-aw extension
        run: curl -sL https://raw.githubusercontent.com/github/gh-aw/main/install-gh-aw.sh | bash

      - name: Compile workflows
        run: gh aw compile --verbose

      - name: Fail if lock files are out of date
        run: |
          if [[ -n "$(git status --porcelain .github/workflows .github/aw)" ]]; then
            echo "::error::One or more .lock.yml files are out of date with their .md source."
            echo "Run 'gh aw compile' locally, review the diff, and commit both the .md and .lock.yml files."
            git status --porcelain .github/workflows .github/aw
            git diff .github/workflows .github/aw
            exit 1
          fi
          echo "All agentic workflow lock files are up to date."
