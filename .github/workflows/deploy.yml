name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'apps/verification-functions/**'
      - 'infra/**'
      - 'packages/learn-to-cloud-shared/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'scripts/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild without cache (for security updates)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

env:
  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_environment: ${{ vars.AZURE_ENV_NAME }}
  TF_VAR_location: ${{ vars.AZURE_LOCATION }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  # -----------------------------------------------------------------------
  # Changes — determine whether deploy jobs should run
  # -----------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Detect deploy-relevant changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            deploy:
              - 'api/**'
              - 'apps/verification-functions/**'
              - 'infra/**'
              - 'packages/learn-to-cloud-shared/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/deploy.yml'
            code:
              - 'api/**'
              - 'apps/verification-functions/**'
              - 'packages/learn-to-cloud-shared/**'
              - 'pyproject.toml'
              - 'uv.lock'

  # -----------------------------------------------------------------------
  # Dependency Review — block PRs that introduce vulnerable dependencies
  # -----------------------------------------------------------------------
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: moderate

  # -----------------------------------------------------------------------
  # Terraform CI — fast PR checks without Azure credentials or remote state
  # -----------------------------------------------------------------------
  terraform-ci:
    needs: [changes]
    if: needs.changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform tests
        run: terraform test -no-color

  # -----------------------------------------------------------------------
  # CI — lint, type-check, test (runs on push AND PR)
  # -----------------------------------------------------------------------
  ci:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: learntocloud
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE__URL: postgresql+asyncpg://postgres:postgres@localhost:5432/learntocloud
      POSTGRES_VERIFICATION_FUNCTIONS_ROLE: ltc_verification_functions_dev
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: "apps/verification-functions/pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --locked

      - name: Static checks (ruff lint, ruff format, ty, migration SQL)
        run: uv run poe static

      - name: Validate curriculum content integrity
        working-directory: packages/learn-to-cloud-shared
        run: uv run python scripts/validate_content.py

      - name: Verify generated YAML JSON schemas are up to date
        working-directory: packages/learn-to-cloud-shared
        run: |
          set -euo pipefail
          uv run python scripts/generate_yaml_schemas.py
          if ! git diff --exit-code src/learn_to_cloud_shared/content/schemas/; then
            echo "::error::JSON Schemas drifted from Pydantic models." >&2
            echo "Run 'cd packages/learn-to-cloud-shared && uv run python scripts/generate_yaml_schemas.py' and commit the result." >&2
            exit 1
          fi

      - name: Verify single migration head (no branches)
        working-directory: api
        run: |
          set -euo pipefail
          heads=$(uv run alembic heads)
          count=$(echo "$heads" | grep -c '(head)' || echo 0)
          if [ "$count" -ne 1 ]; then
            echo "Expected exactly 1 alembic head; found $count:" >&2
            echo "$heads" >&2
            exit 1
          fi
          echo "OK: 1 alembic head"

      - name: Lint migration filenames and docstrings
        working-directory: api
        run: uv run python scripts/check_migration_naming.py

      - name: Apply migrations to CI database
        working-directory: api
        run: uv run alembic upgrade head

      - name: Verify model and migrations are in sync (alembic check)
        working-directory: api
        run: uv run alembic check

      - name: Run curriculum YAML -> DB sync (simulates deploy-time job)
        working-directory: packages/learn-to-cloud-shared
        # Matches the subprocess invocation in api/scripts/run_migrations.py.
        # Production migration images set CONTENT__DIR explicitly because
        # curriculum YAML is no longer package data in the shared wheel.
        env:
          CONTENT__DIR: ${{ github.workspace }}/packages/learn-to-cloud-shared/src/learn_to_cloud_shared/content/phases
        run: uv run python -m learn_to_cloud_shared.cli.sync_curriculum

      - name: Run test suites with coverage and verification import smoke
        run: uv run poe test

  # -----------------------------------------------------------------------
  # Status gates — always run so required checks are reported on every PR,
  # even when path filters cause the real jobs to be skipped.
  # Point branch-protection at these instead of the underlying jobs.
  # -----------------------------------------------------------------------
  ci-status:
    if: always()
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI result
        run: |
          if [[ "${{ needs.ci.result }}" =~ ^(success|skipped)$ ]]; then
            echo "CI passed or was skipped (no code changes)"
          else
            echo "CI failed: ${{ needs.ci.result }}"
            exit 1
          fi

  dependency-review-status:
    if: always()
    needs: [dependency-review]
    runs-on: ubuntu-latest
    steps:
      - name: Check dependency review result
        run: |
          if [[ "${{ needs.dependency-review.result }}" =~ ^(success|skipped)$ ]]; then
            echo "Dependency review passed or was skipped (push event)"
          else
            echo "Dependency review failed: ${{ needs.dependency-review.result }}"
            exit 1
          fi

  terraform-ci-status:
    if: always()
    needs: [terraform-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Check Terraform CI result
        run: |
          if [[ "${{ needs.terraform-ci.result }}" =~ ^(success|skipped)$ ]]; then
            echo "Terraform CI passed or was skipped (no deploy changes)"
          else
            echo "Terraform CI failed: ${{ needs.terraform-ci.result }}"
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Terraform — validate/plan on manual branch runs, apply only on main
  # -----------------------------------------------------------------------
  terraform:
    if: always() && github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && needs.changes.outputs.deploy == 'true')) && !contains(needs.*.result, 'failure')
    needs: [ci, changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_USE_OIDC: true
    defaults:
      run:
        working-directory: infra
    outputs:
      api_container_app_name: ${{ steps.tf-outputs.outputs.api_container_app_name }}
      resource_group_name: ${{ steps.tf-outputs.outputs.resource_group_name }}
      container_registry_name: ${{ steps.tf-outputs.outputs.container_registry_name }}
      container_registry_endpoint: ${{ steps.tf-outputs.outputs.container_registry_endpoint }}
      database_host: ${{ steps.tf-outputs.outputs.database_host }}
      database_name: ${{ steps.tf-outputs.outputs.database_name }}
      migration_job_name: ${{ steps.tf-outputs.outputs.migration_job_name }}
      migration_identity_client_id: ${{ steps.tf-outputs.outputs.migration_identity_client_id }}
      migration_identity_id: ${{ steps.tf-outputs.outputs.migration_identity_id }}
      migration_postgres_role: ${{ steps.tf-outputs.outputs.migration_postgres_role }}
      verification_functions_postgres_role: ${{ steps.tf-outputs.outputs.verification_functions_postgres_role }}
      api_url: ${{ steps.tf-outputs.outputs.api_url }}
      verification_functions_name: ${{ steps.tf-outputs.outputs.verification_functions_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Azure CLI Login for deployment
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -backend-config="key=learn-to-cloud-${AZURE_ENV_NAME:-dev}.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false -lock-timeout=120s
        env:
          TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_github_client_id: ${{ secrets.TF_VAR_github_client_id }}
          TF_VAR_smoke_test_token: ${{ secrets.SMOKE_TEST_TOKEN }}
          TF_VAR_postgres_entra_admin_object_id: ${{ vars.POSTGRES_ENTRA_ADMIN_OBJECT_ID }}
          TF_VAR_postgres_entra_admin_principal_name: ${{ vars.POSTGRES_ENTRA_ADMIN_PRINCIPAL_NAME }}
          TF_VAR_postgres_entra_admin_principal_type: ${{ vars.POSTGRES_ENTRA_ADMIN_PRINCIPAL_TYPE || 'Group' }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -lock-timeout=120s tfplan

      - name: Get Terraform Outputs
        if: github.ref == 'refs/heads/main'
        id: tf-outputs
        run: |
          echo "api_container_app_name=$(terraform output -raw api_container_app_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw AZURE_RESOURCE_GROUP)" >> "$GITHUB_OUTPUT"
          echo "container_registry_name=$(terraform output -raw AZURE_CONTAINER_REGISTRY_NAME)" >> "$GITHUB_OUTPUT"
          echo "container_registry_endpoint=$(terraform output -raw AZURE_CONTAINER_REGISTRY_ENDPOINT)" >> "$GITHUB_OUTPUT"
          echo "database_host=$(terraform output -raw database_host)" >> "$GITHUB_OUTPUT"
          echo "database_name=$(terraform output -raw postgres_database_name)" >> "$GITHUB_OUTPUT"
          echo "migration_job_name=$(terraform output -raw migration_job_name)" >> "$GITHUB_OUTPUT"
          echo "migration_identity_client_id=$(terraform output -raw migration_identity_client_id)" >> "$GITHUB_OUTPUT"
          echo "migration_identity_id=$(terraform output -raw migration_identity_id)" >> "$GITHUB_OUTPUT"
          echo "migration_postgres_role=$(terraform output -raw migration_postgres_role)" >> "$GITHUB_OUTPUT"
          echo "verification_functions_postgres_role=$(terraform output -raw verification_functions_postgres_role)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(terraform output -raw api_url)" >> "$GITHUB_OUTPUT"
          echo "verification_functions_name=$(terraform output -raw verification_functions_name)" >> "$GITHUB_OUTPUT"

  # -----------------------------------------------------------------------
  # Deploy — build image, push, update container app (push to main only)
  # -----------------------------------------------------------------------
  deploy:
    if: always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.deploy == 'true') && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    needs: [terraform, changes]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: "apps/verification-functions/pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Azure CLI Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build verification Functions package
        run: |
          rm -rf apps/verification-functions/.python_packages
          python -c "import sys; assert sys.version_info[:2] == (3, 13), sys.version"
          # Export only the verification-functions dependency closure from the
          # workspace lockfile. --package scopes the export to this member (plus
          # its shared dependency) and excludes the API's own dependencies.
          # Run from the workspace root so the shared package resolves to
          # ./packages/learn-to-cloud-shared.
          uv export \
            --package learn-to-cloud-verification-functions \
            --locked \
            --no-dev \
            --no-emit-project \
            --no-editable \
            --format requirements.txt \
            --no-hashes \
            --output-file /tmp/verification-functions-requirements.txt
          uv pip install \
            --python "$(which python)" \
            --target apps/verification-functions/.python_packages/lib/site-packages \
            -r /tmp/verification-functions-requirements.txt
          cd apps/verification-functions
          DATABASE__URL="postgresql+asyncpg://postgres:postgres@localhost:5432/learntocloud" PYTHONPATH="$PWD/.python_packages/lib/site-packages" python - <<'PY'
          import asyncpg
          import function_app
          PY

      - name: Deploy verification Functions
        uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ needs.terraform.outputs.verification_functions_name }}
          package: apps/verification-functions
          remote-build: false

      - name: Log in to ACR
        run: az acr login --name ${{ needs.terraform.outputs.container_registry_name }}

      - name: Build and Push Container Images
        run: |
          API_CACHE_FLAGS=""
          MIGRATIONS_CACHE_FLAGS=""
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            API_CACHE_FLAGS="--no-cache --pull"
            MIGRATIONS_CACHE_FLAGS="--no-cache --pull"
          else
            docker pull ${{ needs.terraform.outputs.container_registry_endpoint }}/api:latest || true
            docker pull ${{ needs.terraform.outputs.container_registry_endpoint }}/migrations:latest || true
            API_CACHE_FLAGS="--cache-from=${{ needs.terraform.outputs.container_registry_endpoint }}/api:latest"
            MIGRATIONS_CACHE_FLAGS="--cache-from=${{ needs.terraform.outputs.container_registry_endpoint }}/migrations:latest"
          fi

          docker build -f api/Dockerfile \
            --target api-runtime \
            $API_CACHE_FLAGS \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --label git-commit=${{ github.sha }} \
            -t ${{ needs.terraform.outputs.container_registry_endpoint }}/api:${{ github.sha }} \
            -t ${{ needs.terraform.outputs.container_registry_endpoint }}/api:latest .

          docker build -f api/Dockerfile \
            --target migrations-runtime \
            $MIGRATIONS_CACHE_FLAGS \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --label git-commit=${{ github.sha }} \
            -t ${{ needs.terraform.outputs.container_registry_endpoint }}/migrations:${{ github.sha }} \
            -t ${{ needs.terraform.outputs.container_registry_endpoint }}/migrations:latest .

          docker run --rm -i ${{ needs.terraform.outputs.container_registry_endpoint }}/api:${{ github.sha }} python - <<'PY'
          from importlib.resources import files
          from pathlib import Path

          phases_path = Path(
              str(files("learn_to_cloud_shared").joinpath("content", "phases"))
          )
          assert not phases_path.exists(), f"API image contains YAML at {phases_path}"
          PY

          docker run --rm -i \
            -e DATABASE__URL="postgresql+asyncpg://postgres:postgres@localhost:5432/learntocloud" \
            ${{ needs.terraform.outputs.container_registry_endpoint }}/migrations:${{ github.sha }} \
            python - <<'PY'
          from learn_to_cloud_shared.content_yaml_loader import get_all_phases_from_yaml

          phases = get_all_phases_from_yaml()
          assert phases, "Migration image did not load curriculum phases"
          PY

          docker push ${{ needs.terraform.outputs.container_registry_endpoint }}/api:${{ github.sha }}
          docker push ${{ needs.terraform.outputs.container_registry_endpoint }}/api:latest
          docker push ${{ needs.terraform.outputs.container_registry_endpoint }}/migrations:${{ github.sha }}
          docker push ${{ needs.terraform.outputs.container_registry_endpoint }}/migrations:latest

      - name: Run database migrations
        env:
          MIGRATION_JOB_NAME: ${{ needs.terraform.outputs.migration_job_name }}
          MIGRATION_CLIENT_ID: ${{ needs.terraform.outputs.migration_identity_client_id }}
          MIGRATION_IDENTITY_ID: ${{ needs.terraform.outputs.migration_identity_id }}
          DATABASE_NAME: ${{ needs.terraform.outputs.database_name }}
          DATABASE_HOST: ${{ needs.terraform.outputs.database_host }}
          DATABASE_USER: ${{ needs.terraform.outputs.migration_postgres_role }}
          POSTGRES_VERIFICATION_FUNCTIONS_ROLE: ${{ needs.terraform.outputs.verification_functions_postgres_role }}
          RESOURCE_GROUP: ${{ needs.terraform.outputs.resource_group_name }}
          IMAGE: ${{ needs.terraform.outputs.container_registry_endpoint }}/migrations:${{ github.sha }}
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt

          execution_name=$(
            az containerapp job start \
              --name "$MIGRATION_JOB_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --container-name migrations \
              --image "$IMAGE" \
              --command python \
              --args scripts/run_migrations.py \
              --env-vars \
                DATABASE__HOST="$DATABASE_HOST" \
                DATABASE__USER="$DATABASE_USER" \
                DATABASE__NAME="$DATABASE_NAME" \
                AZURE_CLIENT_ID="$MIGRATION_CLIENT_ID" \
                POSTGRES_VERIFICATION_FUNCTIONS_ROLE="$POSTGRES_VERIFICATION_FUNCTIONS_ROLE" \
                CONTENT__DIR="/app/content/phases" \
              --registry-identity "$MIGRATION_IDENTITY_ID" \
              --query name \
              --output tsv
          )
          echo "Started migration job execution: $execution_name"

          for i in {1..180}; do
            status=$(
              az containerapp job execution show \
                --name "$MIGRATION_JOB_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --job-execution-name "$execution_name" \
                --query "properties.status" \
                --output tsv
            )
            echo "Migration job status: $status"

            if [[ "$status" == "Succeeded" ]]; then
              exit 0
            fi
            if [[ "$status" =~ ^(Failed|Canceled|Cancelled)$ ]]; then
              az containerapp job logs show \
                --name "$MIGRATION_JOB_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --container migrations \
                --execution "$execution_name" \
                --tail 100 \
                --format text || true
              exit 1
            fi

            sleep 10
          done

          echo "Migration job did not complete before timeout."
          az containerapp job logs show \
            --name "$MIGRATION_JOB_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --container migrations \
            --execution "$execution_name" \
            --tail 100 \
            --format text || true
          exit 1

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ needs.terraform.outputs.api_container_app_name }} \
            --resource-group ${{ needs.terraform.outputs.resource_group_name }} \
            --container-name api \
            --image ${{ needs.terraform.outputs.container_registry_endpoint }}/api:${{ github.sha }}

      - name: Wait for readiness
        run: |
          set -euo pipefail
          APP_NAME="${{ needs.terraform.outputs.api_container_app_name }}"
          RG="${{ needs.terraform.outputs.resource_group_name }}"
          READY_URL="${{ needs.terraform.outputs.api_url }}/ready"

          # Resolve the revision matching this deploy's image tag so a stale
          # previous revision still serving traffic cannot mask a failed rollout.
          IMAGE="${{ needs.terraform.outputs.container_registry_endpoint }}/api:${{ github.sha }}"
          echo "Looking for revision running image: $IMAGE"
          REVISION=""
          for i in {1..12}; do
            REVISION=$(az containerapp revision list \
              --name "$APP_NAME" --resource-group "$RG" \
              --query "[?properties.template.containers[0].image=='$IMAGE'] | [0].name" \
              -o tsv 2>/dev/null || true)
            if [[ -n "$REVISION" && "$REVISION" != "None" ]]; then
              echo "Found revision: $REVISION"
              break
            fi
            echo "Attempt $i: revision not found yet, retrying in 5s..."
            sleep 5
          done
          if [[ -z "$REVISION" || "$REVISION" == "None" ]]; then
            echo "ERROR: Could not find a revision for image $IMAGE"
            exit 1
          fi

          echo "Waiting for revision $REVISION to become healthy and serve traffic..."
          for i in {1..36}; do
            STATE=$(az containerapp revision show \
              --name "$APP_NAME" --resource-group "$RG" --revision "$REVISION" \
              --query "{health:properties.healthState, running:properties.runningState, replicas:properties.replicas, traffic:properties.trafficWeight}" \
              -o json 2>/dev/null || echo '{}')
            HEALTH=$(echo "$STATE" | jq -r '.health // "Unknown"')
            RUNNING=$(echo "$STATE" | jq -r '.running // "Unknown"')
            REPLICAS=$(echo "$STATE" | jq -r '.replicas // 0')
            TRAFFIC=$(echo "$STATE" | jq -r '.traffic // 0')
            echo "Attempt $i: health=$HEALTH running=$RUNNING replicas=$REPLICAS traffic=$TRAFFIC"

            if [[ "$RUNNING" == "ActivationFailed" || "$RUNNING" == "Failed" ]]; then
              echo "ERROR: Revision $REVISION entered $RUNNING state."
              echo "--- Recent application logs ---"
              az containerapp logs show \
                --name "$APP_NAME" --resource-group "$RG" --revision "$REVISION" \
                --tail 100 --format text 2>&1 || true
              exit 1
            fi

            if [[ "$HEALTH" == "Healthy" && "$TRAFFIC" -gt 0 ]]; then
              code=$(curl -s -o /dev/null -w "%{http_code}" "$READY_URL" || true)
              if [[ "$code" == "200" ]]; then
                echo "API is ready (revision $REVISION serving traffic)."
                exit 0
              fi
              echo "Revision healthy but /ready returned $code, retrying..."
            fi
            sleep 10
          done
          echo "ERROR: Revision $REVISION did not become healthy and serve traffic in time."
          az containerapp logs show \
            --name "$APP_NAME" --resource-group "$RG" --revision "$REVISION" \
            --tail 100 --format text 2>&1 || true
          exit 1

      - name: Smoke test verification submit path
        env:
          SMOKE_TEST_TOKEN: ${{ secrets.SMOKE_TEST_TOKEN }}
          SMOKE_URL: ${{ needs.terraform.outputs.api_url }}/internal/smoke/verification
        run: |
          set -euo pipefail

          # The gate only runs once the shared secret exists in both places
          # (the GitHub secret here and, via Terraform, the running app). Until
          # then, warn loudly instead of blocking every deploy.
          if [[ -z "${SMOKE_TEST_TOKEN:-}" ]]; then
            echo "::warning::SMOKE_TEST_TOKEN is not set — skipping the post-deploy verification smoke test."
            echo "Set the SMOKE_TEST_TOKEN repository secret to activate this deploy gate."
            exit 0
          fi

          echo "POSTing verification smoke check to $SMOKE_URL"

          # Retry briefly: traffic can take a few seconds to fully shift to the
          # freshly deployed revision after readiness reports healthy.
          code=000
          for i in {1..6}; do
            code=$(curl -s -o /tmp/smoke_body.txt -w "%{http_code}" \
              -X POST "$SMOKE_URL" \
              -H "X-Smoke-Test-Token: $SMOKE_TEST_TOKEN" || echo 000)
            echo "Attempt $i: HTTP $code"

            if [[ "$code" == "200" ]]; then
              echo "Verification smoke test passed."
              cat /tmp/smoke_body.txt || true
              exit 0
            fi

            # A 5xx means the verification submit code path is broken against the
            # live database schema (the incident #432 class of failure). Fail now.
            if [[ "$code" =~ ^5 ]]; then
              echo "ERROR: smoke endpoint returned $code — verification submit path is broken."
              cat /tmp/smoke_body.txt || true
              exit 1
            fi

            sleep 5
          done

          echo "ERROR: verification smoke test did not pass (last HTTP $code)."
          echo "401 means the app's SMOKE_TEST__TOKEN does not match this secret;"
          echo "404 means the app has no token configured yet."
          cat /tmp/smoke_body.txt || true
          exit 1
