# CodeQL configuration
#
# Log Injection (py/log-injection) is excluded because this codebase emits
# structured JSON logs through a centralized python-json-logger stdout
# formatter. It serializes records with json.dumps(), so control characters in
# string extra={} fields are JSON-escaped instead of emitted as raw line breaks
# in container logs.
#
# This formatter is:
# - Registered on the app-owned stdout handler in configure_logging()
# - Tested with unit coverage for JSON-escaped control characters
# - Used for structured JSON logging in production
#
# CodeQL's static analysis cannot trace through runtime logging formatters,
# so it reports false positives on every log call that includes user input.
# Rather than wrapping 50+ call sites in redundant logging helper calls,
# we exclude the rule and rely on centralized JSON serialization.

queries:
  - uses: security-extended

query-filters:
  - exclude:
      id: py/log-injection
