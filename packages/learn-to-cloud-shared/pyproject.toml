[build-system]
requires = ["setuptools>=82.0.1"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = false

[tool.setuptools.packages.find]
where = ["src"]
include = ["learn_to_cloud_shared*"]

[tool.setuptools.package-data]
# Only the compiled artifact ships in the wheel -- authored YAML under
# content/phases/ stays source-only (see content_yaml_loader.py).
learn_to_cloud_shared = ["content/curriculum.json"]

[project]
name = "learn-to-cloud-shared"
version = "0.1.0"
description = "Shared Learn to Cloud domain, database, and verification code"
requires-python = ">=3.13"
dependencies = [
    "aiohttp>=3.14.1",
    "asyncpg>=0.31.0",
    "azure-identity>=1.25.2",
    "azure-monitor-opentelemetry>=1.8.9",
    "cachetools>=7.0.6",
    "fastapi>=0.139.0,<1",
    "greenlet>=3.2.4",
    "httpx>=0.28.1,<1",
    "opentelemetry-exporter-otlp-proto-grpc>=1.20.0",
    "opentelemetry-exporter-otlp-proto-http>=1.20.0",
    "opentelemetry-instrumentation-httpx>=0.61b0",
    "opentelemetry-instrumentation-logging==0.64b0",
    "opentelemetry-instrumentation-sqlalchemy==0.64b0",
    "pydantic>=2.13.3,<3",
    "pydantic-settings>=2.14.2",
    "python-json-logger>=4.1.0",
    "pyyaml>=6.0",
    "sqlalchemy>=2.0.49,<3",
    "tenacity>=8.2.0,<9.1.5",
]

[dependency-groups]
dev = [
    "pytest>=8.4.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=4.1.0",
    "ruamel-yaml>=0.18",
    "ruff==0.15.12",
    "ty==0.0.34",
]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "PLC0415"]

[tool.ruff.lint.per-file-ignores]
"src/learn_to_cloud_shared/core/observability.py" = ["PLC0415"]
"tests/**" = ["PLC0415"]

[tool.coverage.run]
source = ["src/learn_to_cloud_shared"]
omit = [
    "tests/*",
    "__pycache__/*",
    ".venv/*",
    "*.pyc",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "@abstractmethod",
    "@abc.abstractmethod",
]
fail_under = 40

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
addopts = [
    "--strict-markers",
    "--strict-config",
    "--durations=10",
    "-ra",
    "-v",
]
markers = [
    "unit: unit tests (fast, no I/O)",
    "integration: integration tests (database required)",
    "slow: tests that take > 1s",
    "smoke: minimal smoke test subset",
    "skip_until_fixed: temporarily skipped tests tied to issues",
]
